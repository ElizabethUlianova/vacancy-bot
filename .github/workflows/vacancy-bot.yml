name: vacancy-bot

# Запуск по расписанию + возможность запустить вручную кнопкой в GitHub.
on:
  schedule:
    - cron: "*/15 * * * *"   # каждые 15 минут (UTC; GitHub может задержать на 10-30 мин в час пик)
  workflow_dispatch: {}

# Нужно, чтобы workflow мог коммитить обновлённый seen.json обратно в репозиторий.
permissions:
  contents: write

# Не запускать параллельно несколько прогонов одновременно.
concurrency:
  group: vacancy-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run vacancy bot (one pass)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vacancy_bot.py --once

      - name: Persist seen.json
        run: |
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git config user.name  "vacancy-bot"
            git config user.email "vacancy-bot@users.noreply.github.com"
            git add seen.json
            git commit -m "chore: update seen.json [skip ci]"
            # Подтягиваем свежие коммиты и ставим свой поверх — на случай гонки с другими пушами.
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}" \
                && git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
              echo "push отклонён, повтор $i…"; sleep 5
            done
            echo "Не удалось запушить seen.json после нескольких попыток."; exit 1
          else
            echo "seen.json без изменений — коммит не нужен."
          fi
